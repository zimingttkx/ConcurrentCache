# ConcurrentCache 配置文件
#
# Version 3.0 - RDB Persistence Support

# 服务端口
port = 6379

# SubReactor 数量（不设置则自动获取 CPU 核心数）
# reactor_count = 32

# 线程池大小（不设置则自动获取 CPU 核心数）
# thread_pool_size = 32

# 日志级别: 0=TRACE, 1=DEBUG, 2=INFO, 3=WARN, 4=ERROR
log_level = 3

# 配置文件检查间隔（秒）
config_check_interval = 10

# RDB 持久化文件路径
rdb_path = ./dump.rdb

# RDB 自动保存间隔（秒），默认 900 秒（15 分钟）
# 0 表示禁用自动保存
rdb_save_interval = 0

# RDB 脏键阈值，达到此数量时立即触发保存（与间隔配合）
rdb_dirty_threshold = 10000

# 最大键数量（淘汰策略）
max_entries = 2000000

# ============ 集群配置 ============
# 是否开启集群模式
cluster_enabled = false

# 集群配置文件路径
cluster_config_file = nodes.conf

# 节点超时时间（毫秒）
cluster_node_timeout = 15000

# 副本有效性因子
cluster_replica_validity_factor = 10

# 是否要求全部槽都覆盖
cluster_require_full_coverage = false